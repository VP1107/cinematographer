<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Meta ── -->
    <title>Tapan Vyas — Cinematographer</title>
    <meta name="description" content="Indian cinematographer based in Mumbai & Ahmedabad. Crafting stories through light and motion — commercials, music videos, short films, and creative direction." />
    <meta name="author" content="Tapan Vyas" />
    <meta name="theme-color" content="#06050a" />

    <!-- ── Open Graph ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Tapan Vyas — Cinematographer" />
    <meta property="og:description" content="Indian cinematographer. Crafting stories through light and motion." />
    <meta property="og:image"       content="/og-image.jpg" />
    <meta property="og:url"         content="https://tapanvyas.in" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Tapan Vyas — Cinematographer" />
    <meta name="twitter:description" content="Indian cinematographer. Crafting stories through light and motion." />
    <meta name="twitter:image"       content="/og-image.jpg" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon"      href="/favicon.png" />

    <!--
      ── Google Fonts — preconnect first, then preload display fonts ──
      Loading order matters for FOUT prevention:
        1. Preconnect to establish TCP/TLS to fonts.googleapis.com
        2. Preload the two display weights we use above the fold
        3. Full @import handled inside globals.css
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical font files (Cormorant Garamond 300 + Tiro Devanagari) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap"
    />
    <!-- Non-blocking font stylesheet -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap"
      />
    </noscript>

    <!-- ── Performance Optimizations ── -->
    <link rel="modulepreload" href="/src/main.jsx" />
    <link rel="modulepreload" href="/src/App.jsx" />

    <!-- ── Inline critical CSS — prevent FOUC on first paint ── -->
    <style>
      /* Ensure body background is set immediately — no white flash */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: #06050a; }
      body {
        background: #06050a;
        color: #f7f0e6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      /* Root mounting point */
      #root {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
